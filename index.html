<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>D&B Wedding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    height:100%;
    font-family:'Poppins',sans-serif;
}

body{
    color:white;
    overflow:hidden;
}

.hero{
    position:relative;
    height:100vh;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background-image:
        linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.55)),
        url("engagement.jpg"); /* Replace with your engagement photo */
    background-size:cover;
    background-position:center;
}

.overlay{
    position:absolute;
    inset:0;
    backdrop-filter:blur(1px);
}

.content{
    position:relative;
    z-index:2;
    width:min(92%,700px);
    animation:fadeIn 1.4s ease;
}

.names{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(3.5rem,9vw,6rem);
    font-weight:700;
    line-height:1;
    text-shadow:0 6px 20px rgba(0,0,0,.55);
}

.amp{
    display:block;
    font-size:.75em;
    font-weight:400;
    margin:8px 0;
}

.date{
    margin-top:22px;
    font-size:1.2rem;
    letter-spacing:4px;
    text-transform:uppercase;
}

.divider{
    width:120px;
    height:2px;
    margin:20px auto;
    background:white;
    opacity:.9;
}

.time{
    font-size:1.1rem;
    letter-spacing:2px;
}

.buttons{
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
}

.btn{
    color:white;
    text-decoration:none;
    padding:15px 34px;
    border:2px solid rgba(255,255,255,.8);
    border-radius:40px;
    backdrop-filter:blur(8px);
    background:rgba(255,255,255,.12);
    transition:.35s;
    font-weight:500;
}

.btn:hover{
    background:white;
    color:#222;
    transform:translateY(-3px);
}

.location{
    margin-top:42px;
    line-height:1.8;
    font-size:1rem;
}

.location strong{
    display:block;
    font-size:1.25rem;
    margin-bottom:4px;
}

.location a{
    color:white;
    text-decoration:none;
    border-bottom:1px solid rgba(255,255,255,.6);
}

.location a:hover{
    border-color:white;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media (max-width:600px){

.names{
    font-size:3.4rem;
}

.date{
    font-size:1rem;
    letter-spacing:2px;
}

.time{
    font-size:1rem;
}

.btn{
    width:100%;
    max-width:260px;
}

.location{
    font-size:.95rem;
}
}
</style>
</head>

<body>

<section class="hero">

<div class="overlay"></div>

<div class="content">

<h1 class="names">
Damaris
<span class="amp">&</span>
Benjamin
</h1>

<div class="date">
October 16, 2026
</div>

<div class="divider"></div>

<div class="time">
6:00 PM
</div>

<div class="buttons">

<a class="btn"
href="https://your-registry-link.com"
target="_blank">
Registry
</a>

<a class="btn"
href="mailto:youremail@example.com?subject=Wedding RSVP">
RSVP
</a>

</div>

<div class="location">

<strong>Bethany URC</strong>

<a href="https://maps.app.goo.gl/uWJQnVSxgSPUoJ6H6"
target="_blank">
5401 Byron Center Ave SW<br>
Wyoming, MI 49519
</a>

</div>

</div>

</section>

</body>
</html>
