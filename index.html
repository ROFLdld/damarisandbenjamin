<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width,initial-scale=1">
				<title>D&B Wedding</title>
				<link rel="preconnect" href="https://fonts.googleapis.com">
					<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
					<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
						<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}body{font-family:Poppins,sans-serif;color:#fff;overflow:hidden;background:#000}
.hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.55)),url('engagement.jpg') center center/cover no-repeat;animation:zoom 24s ease-in-out infinite alternate}
.overlay{position:absolute;inset:0;background:linear-gradient(rgba(0,0,0,.15),rgba(0,0,0,.35),rgba(0,0,0,.6))}
.content{position:relative;z-index:2;width:min(92%,760px);padding:24px}
.names{font:700 clamp(4rem,10vw,7rem) 'Cormorant Garamond',serif;line-height:.95;text-shadow:0 8px 25px rgba(0,0,0,.6);animation:fade .9s .2s both}
.amp{display:block;font-weight:400;font-size:.65em;margin:.15em 0}
.date,.time,.buttons,.location{animation:fade .9s both}
.date{margin-top:22px;letter-spacing:5px;text-transform:uppercase;animation-delay:.5s}
.divider{width:90px;height:1px;background:#fff;margin:26px auto;position:relative;opacity:.9}
.divider:after{content:"❦";position:absolute;left:50%;top:-14px;transform:translateX(-50%);padding:0 12px;font-size:22px}
.time{animation-delay:.8s;font-size:1.15rem}
.buttons{margin:40px 0;display:flex;gap:18px;justify-content:center;flex-wrap:wrap;animation-delay:1.1s}
.btn{padding:15px 34px;border-radius:999px;border:1px solid rgba(255,255,255,.75);background:rgba(255,255,255,.18);backdrop-filter:blur(10px);color:#fff;text-decoration:none;transition:.3s;box-shadow:0 12px 30px rgba(0,0,0,.25)}
.btn:hover{background:#fff;color:#222;transform:translateY(-4px) scale(1.03)}
.location{line-height:1.8;animation-delay:1.4s}.location strong{display:block;font-size:1.3rem}.location a{color:#fff}
body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 20% 30%,rgba(255,255,255,.18)0 2px,transparent 3px),radial-gradient(circle at 80% 65%,rgba(255,255,255,.15)0 2px,transparent 3px),radial-gradient(circle at 60% 15%,rgba(255,255,255,.15)0 2px,transparent 3px);animation:float 16s linear infinite}
.scroll{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:30px;animation:bounce 2s infinite}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes zoom{from{background-size:100%}to{background-size:108%}}
@keyframes float{from{transform:translateY(40px)}to{transform:translateY(-120px)}}
@keyframes bounce{50%{transform:translate(-50%,-8px)}}
@media(max-width:600px){.buttons{flex-direction:column;align-items:center}.btn{width:260px}}
</style>
	</head>
	<body>
		<section class="hero">
			<div class="overlay"/>
				<div class="content">
					<h1 class="names">Damaris<span class="amp">&amp;</span>Ben</h1>
				<div class="date">October 16, 2026</div>
				<div class="divider"/>
				<div class="time">Ceremony Begins at 6:00 PM</div>
				<div class="buttons">
					<a class="btn" href="https://your-registry-link.com" target="_blank">Registry</a>
					<a class="btn" href="mailto:youremail@example.com?subject=Wedding RSVP">RSVP</a>
				</div>
				<div class="location">
					<strong>Bethany URC</strong>
					<a target="_blank" href="https://maps.app.goo.gl/uWJQnVSxgSPUoJ6H6">5401 Byron Center Ave SW<br>Wyoming, MI 49519</a>
				</div>
			</div>
		</section>
	</body>
</html>
